apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: ecommerce-microservice
  labels:
    app: auth
spec:
  template:
    metadata:
      labels:
        app: auth
  selector:
    matchLabels:
      app: auth
  replicas: 2
  spec:
    containers:
      - name: auth
        image: ghcr.io/zyncc/auth:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 500m
            memory: 1000Mi
          limits:
            cpu: 2000m
            memory: 2000Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: auth-config
          - secretRef:
              name: auth-secret
        ports:
          - containerPort: 8081
    restartPolicy: Always
