apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: ecommerce-microservice
  labels:
    app: inventory
spec:
  template:
    metadata:
      labels:
        app: inventory
  selector:
    matchLabels:
      app: inventory
  replicas: 2
  spec:
    containers:
      - name: inventory
        image: ghcr.io/zyncc/inventory:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 500m
            memory: 1000Mi
          limits:
            cpu: 2000m
            memory: 2000Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: inventory-config
          - secretRef:
              name: inventory-secret
        ports:
          - containerPort: 8083
    restartPolicy: Always
