apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: ecommerce-microservice
  labels:
    app: payment
spec:
  template:
    metadata:
      labels:
        app: payment
  selector:
    matchLabels:
      app: payment
  replicas: 2
  spec:
    containers:
      - name: payment
        image: ghcr.io/zyncc/payment:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 500m
            memory: 1000Mi
          limits:
            cpu: 2000m
            memory: 2000Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8085
          initialDelaySeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: payment-config
          - secretRef:
              name: payment-secret
        ports:
          - containerPort: 8085
    restartPolicy: Always
